name: Reporte de Ventas Diario - Europa

# DISPARADORES:
#   1. repository_dispatch -> lo dispara un cron externo (cron-job.org) a las 7:00 AR.
#   2. schedule (cron nativo) -> RED DE RESPALDO a las 7:30 AR. Como report.py tiene
#      anti doble-conteo, si ya se mandó, este ve la fecha procesada y NO reenvía.
#   3. workflow_dispatch -> botón manual.
on:
  repository_dispatch:
    types: [reporte-diario]
  schedule:
    # 10:30 UTC = 7:30 AR (UTC-3). Respaldo, media hora después del disparo externo (7:00).
    - cron: "30 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: reporte-ventas-europa
  cancel-in-progress: false

jobs:
  enviar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install openpyxl matplotlib

      - name: Bajar reportes de Shares (mails -> data/ventas_dia.json)
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASS: ${{ secrets.IMAP_APP_PASS }}
        run: python fetch_shares.py

      - name: Armar acumulado 2025 desde el master
        run: python generar_acum2025.py

      - name: Generar reporte (y actualizar acumulado)
        id: gen
        run: python report.py

      - name: Enviar mail
        if: steps.gen.outputs.send == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python send_mail.py "${{ steps.gen.outputs.subject }}" preview.html

      - name: Commitear resultados
        if: steps.gen.outputs.send == 'true'
        run: |
          git config user.name "luccianos-bot"
          git config user.email "bot@luccianos.local"
          git add data/acumulado.json data/ventas_dia.json data/acum_interanual.json charts/
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "Reporte del ${{ steps.gen.outputs.date }} [skip ci]"
            git push
          fi
